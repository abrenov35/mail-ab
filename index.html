
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  :root {
    --navy: #162D49; --beige: #F3EAE2; --lavande: #A495C3;
    --muted: #8A9BAD; --border: #DDD5CA; --bgsoft: #EDE8E1; --bgcard: #F9F6F2;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--beige); }
  button { -webkit-appearance: none; font-family: inherit; cursor: pointer; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .shimmer-line { height:11px; border-radius:6px; background:linear-gradient(90deg,var(--border),var(--bgsoft),var(--border)); background-size:200% 100%; animation:shimmer 1.5s infinite; }
  ::-webkit-scrollbar { display:none; }
</style>

<div id="app" style="max-width:420px;margin:0 auto;height:600px;display:flex;flex-direction:column;background:var(--beige);border-radius:16px;overflow:hidden;border:1px solid var(--border);">
</div>

<script>
const C = { navy:"#162D49", beige:"#F3EAE2", lavande:"#A495C3", white:"#FFFFFF", muted:"#8A9BAD", border:"#DDD5CA", bgsoft:"#EDE8E1" };

const EMAILS = [
  { id:1, fromName:"Marc Dupont", from:"marc.dupont@entreprise.fr", subject:"Retard livraison commande #4872 — urgent", date:"2026-05-30T08:14:00", attachments:[], body:"Bonjour,\n\nJe me permets de vous relancer concernant la commande #4872 passée il y a maintenant 12 jours. Le délai annoncé était de 5 jours ouvrés. Nous accusons un retard d'une semaine sans aucune explication.\n\nCette commande est indispensable à notre production. Chaque jour de retard nous coûte 2 000 € de perte.\n\nJe vous demande de communiquer :\n— la raison du retard,\n— une date de livraison ferme,\n— les compensations prévues.\n\nCordialement,\nMarc Dupont" },
  { id:2, fromName:"Sophie Martin", from:"sophie.martin@startup.io", subject:"Demande de devis — intégration API", date:"2026-05-30T10:45:00", attachments:["spec_technique.pdf"], body:"Bonjour,\n\nNous souhaitons intégrer une solution d'automatisation des e-mails à notre plateforme SaaS.\n\nDevis pour :\n- API ~50 000 requêtes/mois\n- Intégration CRM Salesforce\n- Support prioritaire\n\nBudget : 3 000–5 000 € / mois.\n\nBien cordialement,\nSophie Martin — CTO" },
  { id:3, fromName:"RH GlobalCorp", from:"rh@globalcorp.com", subject:"Invitation entretien — Développeur Senior", date:"2026-05-29T16:30:00", attachments:[], body:"Bonjour,\n\nNous avons le plaisir de vous inviter à un entretien pour le poste de Développeur Senior Full-Stack.\n\nJeudi 5 juin 2026 à 10h00 — visioconférence (1h30).\n\nMerci de confirmer votre disponibilité.\n\nCordialement,\nÉquipe RH" },
];

const URG = {
  critique:{ color:"#C0392B", bg:"#FDECEA", label:"CRITIQUE" },
  haute:   { color:"#B7591A", bg:"#FEF3E2", label:"HAUTE" },
  moderee: { color:C.navy,   bg:"#E8EFF6", label:"MODÉRÉE" },
  faible:  { color:"#2E7D52", bg:"#EAF2EA", label:"FAIBLE" },
};

const MODS = ["Plus court","Plus développé","Plus diplomatique","Plus ferme","Plus commercial","Plus technique"];
const MOD_IDS = ["shorter","longer","diplomatic","firm","commercial","technical"];

let emails = [...EMAILS];
let screen = "list";
let selected = null;
let analysis = null;
let reply = "";
let loading = false;
let replyLoading = false;
let activeMod = null;
let copied = false;
let activeTab = "reply";

function timeAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 3600) return Math.round(s/60)+"m";
  if (s < 86400) return Math.round(s/3600)+"h";
  return Math.round(s/86400)+"j";
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => c != null && el.append(typeof c === "string" ? c : c));
  return el;
}

function shimmerBlock(n) {
  const wrap = h("div", {style:{display:"flex",flexDirection:"column",gap:"10px"}});
  const ws = [85,65,90,55,78,60,88];
  for(let i=0;i<n;i++) {
    const d = h("div", {class:"shimmer-line", style:{width:ws[i%ws.length]+"%", animationDelay:(i*0.1)+"s"}});
    wrap.append(d);
  }
  return wrap;
}

async function callClaude(messages, system) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages})
  });
  const d = await r.json();
  return (d.content||[]).map(b=>b.text||"").join("");
}

async function doAnalyze(email) {
  const sys = 'Tu es AB MAIL. Reponds UNIQUEMENT en JSON valide sans markdown.\nFormat: {"category":"string","summary":"string","demand":"string","urgency":"faible|moderee|haute|critique","action":"string"}';
  const txt = await callClaude([{role:"user",content:"De: "+email.from+"\nObjet: "+email.subject+"\n\n"+email.body}], sys);
  try { return JSON.parse(txt.replace(/```json|```/g,"").trim()); }
  catch { return {category:"Échange",summary:"Analyse indisponible",demand:"Voir le mail",urgency:"moderee",action:"Répondre"}; }
}

async function doReply(email, ana, modifier, prev) {
  const sys = "Tu es AB MAIL, expert en e-mails professionnels francais. Genere UNIQUEMENT le corps de la reponse, prete a copier.";
  const mmap = {shorter:"Raccourcis cette reponse",longer:"Developpe davantage",diplomatic:"Ton plus diplomatique",firm:"Ton plus ferme",commercial:"Angle commercial",technical:"Precisions techniques"};
  const content = (modifier && prev) ? (mmap[modifier]||modifier)+" :\n\n"+prev : "Redige une reponse professionnelle.\nDe: "+email.from+"\nObjet: "+email.subject+"\n\n"+email.body+"\n\nContexte: "+ana.category+" — "+ana.summary;
  return callClaude([{role:"user",content}], sys);
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (screen === "list") app.append(renderList());
  else app.append(renderDetail());
}

function renderList() {
  const wrap = h("div", {style:{display:"flex",flexDirection:"column",height:"100%"}});

  const header = h("div", {style:{background:C.navy,padding:"18px 18px 14px",flexShrink:"0"}});
  const topRow = h("div", {style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}});
  const logo = h("div", {style:{width:"34px",height:"34px",background:C.white,borderRadius:"7px",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif",fontWeight:"800",fontSize:"13px",color:C.navy,flexShrink:"0"}}, "AB");
  const logoText = h("div", {});
  const l1 = h("div", {style:{fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif",fontWeight:"700",fontSize:"14px",color:C.white,letterSpacing:"2px"}}, "RENOV MAIL");
  const l2 = h("div", {style:{fontSize:"9px",color:"rgba(255,255,255,0.4)",letterSpacing:"1.2px"}}, "ASSISTANT IA");
  logoText.append(l1,l2); topRow.append(logo,logoText); header.append(topRow);
  const addr = h("div", {style:{background:"rgba(255,255,255,0.08)",borderRadius:"7px",padding:"8px 12px",fontSize:"11px",color:"rgba(255,255,255,0.45)",display:"flex",alignItems:"center",gap:"6px"}});
  const dot = h("span", {style:{width:"7px",height:"7px",borderRadius:"50%",background:"#6FCF97",display:"inline-block",flexShrink:"0"}});
  addr.append(dot,"ia.mail.app@gmail.com"); header.append(addr);

  const label = h("div", {style:{padding:"12px 18px 5px",fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.5px",flexShrink:"0"}}, "Boîte de réception — "+emails.length);

  const list = h("div", {style:{flex:"1",overflowY:"auto"}});
  if (emails.length===0) {
    list.append(h("div", {style:{padding:"48px 18px",textAlign:"center",color:C.muted,fontSize:"13px"}}, "Aucun message"));
  }
  emails.forEach(e => {
    const row = h("div", {style:{display:"flex",alignItems:"stretch",borderBottom:"1px solid "+C.border,background:C.white}});
    const btn = h("button", {style:{flex:"1",textAlign:"left",background:"transparent",border:"none",padding:"15px 10px 15px 18px",cursor:"pointer",minWidth:"0"},
      onclick:()=>{ openEmail(e); }});
    const inner = h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}});
    const left = h("div", {style:{flex:"1",minWidth:"0"}});
    left.append(
      h("div",{style:{fontSize:"14px",fontWeight:"700",color:C.navy,marginBottom:"3px"}},e.fromName),
      h("div",{style:{fontSize:"11.5px",color:C.muted,lineHeight:"1.45",marginBottom:"4px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},e.subject),
      h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
        h("span",{style:{fontSize:"11px",color:C.muted}},new Date(e.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})),
        ...(e.attachments.length>0?[h("span",{style:{fontSize:"11px",color:C.muted}},"📎")]:[])
      )
    );
    const right = h("div", {style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px",flexShrink:"0"}});
    right.append(
      h("span",{style:{fontSize:"11px",color:C.muted}},timeAgo(e.date)),
      h("span",{style:{fontSize:"17px",color:C.border,lineHeight:"1"}}, "›")
    );
    inner.append(left,right); btn.append(inner);
    const del = h("button", {
      style:{flexShrink:"0",width:"48px",background:"transparent",border:"none",borderLeft:"1px solid "+C.border,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",transition:"background 0.15s"},
      onclick:(ev)=>{ ev.stopPropagation(); deleteEmail(e.id); }
    }, "🗑");
    del.addEventListener("mouseenter",()=>del.style.background="#FDECEA");
    del.addEventListener("mouseleave",()=>del.style.background="transparent");
    row.append(btn,del);
    list.append(row);
  });

  wrap.append(header,label,list);
  return wrap;
}

function renderDetail() {
  const wrap = h("div", {style:{display:"flex",flexDirection:"column",height:"100%",background:C.beige}});
  const urgKey = analysis ? analysis.urgency : "moderee";
  const urg = URG[urgKey]||URG.moderee;

  // Header
  const topbar = h("div", {style:{background:C.navy,padding:"13px 16px",display:"flex",alignItems:"center",gap:"10px",flexShrink:"0"}});
  const backBtn = h("button", {style:{background:"none",border:"none",color:C.white,fontSize:"21px",cursor:"pointer",padding:"0",lineHeight:"1",flexShrink:"0"},onclick:()=>{screen="list";render();}}, "‹");
  const titleWrap = h("div", {style:{flex:"1",minWidth:"0"}});
  titleWrap.append(
    h("div",{style:{fontSize:"12.5px",fontWeight:"700",color:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},selected.subject),
    h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.4)",marginTop:"2px"}},selected.fromName)
  );
  const delBtn = h("button", {style:{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:"16px",cursor:"pointer",padding:"0 0 0 4px",flexShrink:"0"},
    onclick:()=>{ deleteEmail(selected.id); screen="list"; render(); }}, "🗑");
  topbar.append(backBtn,titleWrap);
  if (analysis) {
    topbar.append(h("span",{style:{flexShrink:"0",padding:"2px 8px",borderRadius:"4px",fontSize:"9px",fontWeight:"700",background:urg.bg,color:urg.color,letterSpacing:"0.8px"}},urg.label));
  }
  topbar.append(delBtn);

  // Tabs
  const tabs = h("div", {style:{display:"flex",background:C.white,borderBottom:"1px solid "+C.border,flexShrink:"0"}});
  [["mail","✉ Mail"],["analyse","🔍 Analyse"],["reply","✍ Réponse"]].forEach(([id,lbl])=>{
    const t = h("button", {
      style:{flex:"1",padding:"12px 4px",border:"none",background:activeTab===id?C.beige:C.white,color:activeTab===id?C.navy:C.muted,fontSize:"12px",fontWeight:"600",cursor:"pointer",borderBottom:activeTab===id?"2px solid "+C.navy:"2px solid transparent",transition:"all 0.15s"},
      onclick:()=>{ activeTab=id; render(); }
    }, lbl);
    tabs.append(t);
  });

  // Content
  const content = h("div", {style:{flex:"1",overflowY:"auto",overflowX:"hidden"}});

  if (activeTab==="mail") {
    const p = h("div", {style:{padding:"18px 16px",display:"flex",flexDirection:"column",gap:"12px"}});
    p.append(
      fieldBlock("De", selected.from),
      ...(selected.attachments.length>0?[fieldBlock("Pièce(s) jointe(s)","📎 "+selected.attachments.join(", "))]:[]),
      fieldBlock("Contenu", selected.body, true)
    );
    content.append(p);
  }

  if (activeTab==="analyse") {
    const p = h("div", {style:{padding:"18px 16px",display:"flex",flexDirection:"column",gap:"12px"}});
    if (loading) { p.append(shimmerBlock(5)); }
    else if (analysis) {
      const badges = h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}});
      badges.append(
        h("span",{style:{padding:"3px 11px",borderRadius:"20px",fontSize:"11px",fontWeight:"700",background:C.navy,color:C.white}},analysis.category),
        h("span",{style:{padding:"3px 11px",borderRadius:"20px",fontSize:"11px",fontWeight:"700",background:urg.bg,color:urg.color}},urg.label)
      );
      p.append(badges,fieldBlock("Résumé",analysis.summary),fieldBlock("Ce qui est demandé",analysis.demand),fieldBlock("Action attendue",analysis.action));
    } else {
      p.append(h("div",{style:{color:C.muted,fontSize:"13px"}},"Analyse en cours…"));
    }
    content.append(p);
  }

  if (activeTab==="reply") {
    const p = h("div", {style:{padding:"16px 16px 0"}});
    const modLabel = h("div",{style:{fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.3px",marginBottom:"8px"}},"Reformuler");
    const grid = h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px",marginBottom:"14px"}});
    MODS.forEach((lbl,i)=>{
      const id = MOD_IDS[i];
      const isActive = activeMod===id;
      const disabled = replyLoading||loading||!reply;
      const mb = h("button",{
        style:{padding:"7px 6px",borderRadius:"7px",fontSize:"11px",fontWeight:"500",background:isActive?C.lavande:C.white,border:"1px solid "+(isActive?C.lavande:C.border),color:isActive?C.white:C.navy,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,transition:"all 0.15s",textAlign:"center"},
        onclick:()=>{ if(!disabled){ applyMod(id); } }
      },lbl);
      grid.append(mb);
    });
    const replyLabel = h("div",{style:{fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.3px",marginBottom:"7px"}},"Réponse proposée");
    const replyBox = h("div",{style:{background:C.white,borderRadius:"10px",border:"1px solid "+C.border,padding:"14px",marginBottom:"16px",minHeight:"80px"}});
    if (replyLoading) { replyBox.append(shimmerBlock(6)); }
    else if (reply) {
      const pre = h("pre",{style:{fontSize:"13px",lineHeight:"1.95",color:C.navy,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},reply);
      replyBox.append(pre);
    } else {
      replyBox.append(h("div",{style:{color:C.muted,fontSize:"13px"}},"Analyse en cours…"));
    }
    p.append(modLabel,grid,replyLabel,replyBox);
    content.append(p);
  }

  // Bottom bar for reply tab
  const bottomBar = h("div", {style:{padding:"10px 16px 16px",background:C.white,borderTop:"1px solid "+C.border,flexShrink:"0",display:"flex",flexDirection:"column",gap:"9px"}});
  if (activeTab==="reply") {
    const regenBtn = h("button",{
      style:{width:"100%",padding:"12px",borderRadius:"8px",fontSize:"13px",fontWeight:"600",background:C.bgsoft,border:"1px solid "+C.border,color:C.navy,cursor:(replyLoading||loading)?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"},
      onclick:()=>{ if(!replyLoading&&!loading) regenerate(); }
    });
    const spinEl = h("span",{style:{display:"inline-block",animation:replyLoading?"spin 1s linear infinite":"none"}}, "↻");
    regenBtn.append(spinEl,"Régénérer une réponse");

    const copyBtn = h("button",{
      style:{width:"100%",padding:"14px",borderRadius:"8px",fontSize:"13px",fontWeight:"700",background:copied?"#2D7D52":(!reply||replyLoading)?C.bgsoft:C.navy,border:"none",color:(!reply||replyLoading)?C.muted:C.white,cursor:(!reply||replyLoading)?"not-allowed":"pointer",letterSpacing:"0.5px",transition:"all 0.2s",fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif"},
      onclick:()=>{ if(reply&&!replyLoading) doCopy(); }
    }, copied?"✓ COPIÉ !":"COPIER LA RÉPONSE");

    const hint = h("div",{style:{fontSize:"10px",color:C.muted,textAlign:"center"}},"Collez dans votre messagerie et envoyez");
    bottomBar.append(regenBtn,copyBtn,hint);
  }

  wrap.append(topbar,tabs,content,bottomBar);
  return wrap;
}

function fieldBlock(lbl, val, isPre) {
  const wrap = h("div",{});
  wrap.append(h("div",{style:{fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.3px",marginBottom:"6px"}},lbl));
  const card = h("div",{style:{background:"#FFFFFF",borderRadius:"9px",border:"1px solid "+C.border,padding:"11px 13px",fontSize:"13px",color:C.navy,lineHeight:"1.6"}});
  if (isPre) {
    const pre = h("pre",{style:{fontSize:"13px",lineHeight:"1.9",color:C.navy,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},val);
    card.append(pre);
  } else {
    card.textContent = val;
  }
  wrap.append(card);
  return wrap;
}

function deleteEmail(id) {
  emails = emails.filter(e=>e.id!==id);
}

function openEmail(email) {
  selected=email; analysis=null; reply=""; activeMod=null; copied=false; activeTab="reply";
  screen="detail"; loading=true; render();
  doAnalyze(email).then(ana=>{
    analysis=ana; loading=false; replyLoading=true; render();
    return doReply(email,ana,null,null);
  }).then(rep=>{
    reply=rep; replyLoading=false; render();
  }).catch(()=>{
    analysis={category:"Erreur",summary:"Impossible d'analyser",demand:"-",urgency:"faible",action:"-"};
    reply="Une erreur est survenue.";
    loading=false; replyLoading=false; render();
  });
}

function applyMod(mod) {
  if (!selected||!analysis||!reply) return;
  activeMod=mod; replyLoading=true; render();
  doReply(selected,analysis,mod,reply).then(rep=>{
    reply=rep; replyLoading=false; render();
  }).catch(()=>{ replyLoading=false; render(); });
}

function regenerate() {
  if (!selected||!analysis) return;
  activeMod=null; replyLoading=true; render();
  doReply(selected,analysis,null,null).then(rep=>{
    reply=rep; replyLoading=false; render();
  }).catch(()=>{ replyLoading=false; render(); });
}

function doCopy() {
  navigator.clipboard.writeText(reply).catch(()=>{});
  copied=true; render();
  setTimeout(()=>{ copied=false; render(); }, 2500);
}

render();
</script>
