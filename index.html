// inbox state

let reply = "";

let atelierMode = "repondre"; // "repondre" | "reformuler"

let atelierCopied = false;

// ── UTILS ─────────────────────────────────────────────────────────────────────
function timeAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 3600) return Math.round(s/60)+"m";
  if (s < 86400) return Math.round(s/3600)+"h";
  return Math.round(s/86400)+"j";
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c => c!=null && el.append(typeof c==="string"?c:c));
  return el;
}

function shimmerBlock(n) {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}});
  const ws=[85,65,90,55,78,60,88];
  for(let i=0;i<n;i++) wrap.append(h("div",{class:"shimmer-line",style:{width:ws[i%ws.length]+"%",animationDelay:(i*0.1)+"s"}}));
  return wrap;
}

async function callClaude(messages, system) {
  const r = await fetch(RAILWAY+"/claude", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system,messages})
  });
  const d = await r.json();
  return (d.content||[]).map(b=>b.text||"").join("");
}

async function doAnalyze(email) {
  const sys = 'Tu es AB MAIL. Reponds UNIQUEMENT en JSON valide sans markdown.\nFormat: {"category":"string (2 mots max)","summary":"string (max 10 mots)","demand":"string (max 8 mots)","urgency":"faible|moderee|haute|critique","action":"string (max 5 mots)","subject":"string (objet de reponse, 6 mots max, SANS prefixe Re: Fwd: TR:)"}';
  const txt = await callClaude([{role:"user",content:"De: "+email.from+"\nObjet: "+email.subject+"\n\n"+email.body}],sys);
  try { return JSON.parse(txt.replace(/```json|```/g,"").trim()); }
  catch { return {category:"Échange",summary:"Analyse indisponible",demand:"Voir le mail",urgency:"moderee",action:"Répondre",subject:email.subject}; }
}

async function doReply(email, ana, modifier, prev) {
  const sys = "Tu es AB MAIL, assistant commercial pour AB RENOV, entreprise de renovation. Regles ABSOLUES SANS EXCEPTION :\n- JAMAIS de signature\n- JAMAIS 'Cordialement' ni variantes\n- JAMAIS mielleux ni compliments\n- JAMAIS de nom de personne — impersonnel uniquement : 'nous traitons', 'une equipe', 'une intervention'\n- INTERDICTION TOTALE ET ABSOLUE de tout element temporel : aucune date, aucun jour (lundi, mardi...), aucune semaine, aucun mois, aucun delai chiffre (48h, 24h, J+3, sous X jours...), aucune expression comme 'semaine prochaine', 'rapidement', 'sous peu'. REMPLACER SYSTEMATIQUEMENT par : 'une date vous sera communiquee' ou 'nous revenons vers vous'. SI TU METS UNE DATE OU UN DELAI TU ENFREINS UNE REGLE CRITIQUE.\n- Aller dans le sens du client avec mesure\n- Style : professionnel, direct, commercial, bankable\n- Appliquer les consignes fournies EN PRIORITE avant de generer\n- INTERDICTION ABSOLUE d'ecrire l'objet ou le sujet du mail dans la reponse, ni en debut, ni en gras, ni sous aucune forme\n- INTERDICTION ABSOLUE de proposer, mentionner ou suggerer un devis, une estimation, un chiffrage ou tout engagement financier — meme si le mail en fait la demande. Repondre uniquement que 'nous revenons vers vous' ou 'un echange sera organise'\n- Par defaut, la reponse doit etre COURTE (3-5 lignes maximum), directe et commerciale. Ne developpe que si une consigne le demande explicitement\n- Genere UNIQUEMENT le corps de la reponse pret a copier";
  const mmap = {shorter:"Raccourcis cette reponse",longer:"Developpe davantage",diplomatic:"Ton plus diplomatique",firm:"Ton plus ferme",commercial:"Angle commercial",technical:"Precisions techniques"};
  const content = (modifier&&prev)
    ? (mmap[modifier]||modifier)+" :\n\n"+prev
    : "Redige une reponse professionnelle.\nDe: "+email.from+"\nObjet: "+email.subject+"\n\n"+email.body+"\n\nContexte: "+ana.category+" — "+ana.summary
      +(userInstruction?"\n\nCONSIGNES A APPLIQUER EN PRIORITE :\n"+userInstruction:"");
  return callClaude([{role:"user",content}],sys);
}

// ── ATELIER CLAUDE CALLS ──────────────────────────────────────────────────────

  const sys = isSms

    : "Tu es AB MAIL, assistant commercial pour AB RENOV, entreprise de renovation. Regles ABSOLUES SANS EXCEPTION :\n- JAMAIS de signature\n- JAMAIS 'Cordialement' ni variantes\n- JAMAIS mielleux ni compliments\n- JAMAIS de nom de personne — impersonnel uniquement\n- INTERDICTION TOTALE de tout element temporel. Remplacer par 'une date vous sera communiquee' ou 'nous revenons vers vous'\n- Style : professionnel, direct, commercial, bankable\n- INTERDICTION ABSOLUE d'ecrire l'objet dans la reponse\n- INTERDICTION de proposer un devis ou engagement financier\n- Par defaut COURT (3-5 lignes)\n- Genere UNIQUEMENT le corps de la reponse";
  const mmap = {shorter:"Raccourcis cette reponse",longer:"Developpe davantage",commercial:"Angle commercial",technical:"Precisions techniques"};
  const content = (modifier&&prev)
    ? (mmap[modifier]||modifier)+" :\n\n"+prev
    : "Redige une reponse professionnelle a ce "+(isSms?"SMS":"mail")+" :\n\n"+texte;

async function doAtelierReformuler(texte, type, modifier, prev) {
  const isSms = type === "sms";
  const sys = isSms
    ? "Tu es AB MAIL, assistant commercial pour AB RENOV. Tu reformules des SMS pour les rendre plus professionnels, clairs et directs. Regles :\n- Garder le sens exact du message original\n- Ton professionnel mais naturel pour un SMS\n- Court et direct\n- JAMAIS de signature\n- JAMAIS d'element temporel (dates, delais)\n- Genere UNIQUEMENT le texte reformule"
    : "Tu es AB MAIL, assistant commercial pour AB RENOV. Tu reformules des emails pour les rendre plus professionnels, percutants et commerciaux. Regles :\n- Garder le sens exact du message original\n- Ton professionnel, direct, commercial, bankable\n- JAMAIS de signature\n- JAMAIS d'element temporel (dates, delais)\n- JAMAIS mielleux ni compliments\n- Genere UNIQUEMENT le texte reformule";
  const mmap = {shorter:"Raccourcis ce texte",longer:"Developpe davantage",commercial:"Angle plus commercial",technical:"Plus technique et precis"};
  const content = (modifier&&prev)
    ? (mmap[modifier]||modifier)+" :\n\n"+prev
    : "Reformule ce "+(isSms?"SMS":"mail")+" :\n\n"+texte;
  return callClaude([{role:"user",content}],sys);
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadEmails() {
  try {
    const r = await fetch(RAILWAY+"/emails");
    emails = await r.json();
    render();
  } catch(e) {}
}

function deleteEmail(id) {
  emails = emails.filter(e => String(e.id) !== String(id));
  fetch(RAILWAY+"/email/"+id, { method:"DELETE" });
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.append(renderApp());
}

function renderApp() {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",height:"100%"}});

  // MAIN HEADER
  const header = h("div",{style:{background:C.navy,flexShrink:"0"}});
  const headerInner = h("div",{style:{padding:"16px 18px 12px",display:"flex",alignItems:"center",gap:"10px"}});
  const logo = h("div",{style:{flex:"1"}});
  logo.append(
    h("div",{style:{fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif",fontWeight:"800",fontSize:"17px",color:C.white,letterSpacing:"1px",lineHeight:"1"}},"AB RENOV 35"),
    h("div",{style:{fontSize:"9px",color:C.lavande,letterSpacing:"2px",fontWeight:"600",textTransform:"uppercase",marginTop:"2px"}},"RENOV MAIL")
  );
  headerInner.append(logo);
  header.append(headerInner);
  header.append(h("div",{style:{height:"3px",background:"linear-gradient(90deg,"+C.lavande+","+C.lavandeDark+","+C.navy+")"}}));

  // MAIN TABS
  const mainTabs = h("div",{style:{display:"flex",background:C.white,borderBottom:"2px solid "+C.border,flexShrink:"0"}});
  [["inbox","📬 Boîte mail"],["atelier","✏️ Atelier"]].forEach(([id,lbl])=>{
    const isActive = mainTab===id;
    mainTabs.append(h("button",{
      style:{flex:"1",padding:"13px 4px",border:"none",background:isActive?C.navy:C.white,color:isActive?C.white:C.muted,fontSize:"13px",fontWeight:"700",cursor:"pointer",borderBottom:isActive?"2px solid "+C.lavande:"2px solid transparent",transition:"all 0.15s"},
      onclick:()=>{mainTab=id;render();}
    },lbl));
  });

  const body = h("div",{style:{flex:"1",overflow:"hidden",display:"flex",flexDirection:"column"}});

  if (mainTab==="inbox") {
    if (screen==="list") body.append(renderList());
    else body.append(renderDetail());
  } else {
    body.append(renderAtelier());
  }

  wrap.append(header, mainTabs, body);
  return wrap;
}

// ── INBOX ─────────────────────────────────────────────────────────────────────
function renderList() {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",height:"100%"}});
  const label = h("div",{style:{padding:"14px 18px 6px",fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.5px",flexShrink:"0"}},"Boîte de réception — "+emails.length);
  const list = h("div",{style:{flex:"1",overflowY:"auto"}});
  if (emails.length===0) list.append(h("div",{style:{padding:"52px 18px",textAlign:"center",color:C.muted,fontSize:"13px"}},"Aucun message"));

  emails.forEach(e => {
    const row = h("div",{style:{display:"flex",alignItems:"stretch",borderBottom:"1px solid "+C.border,background:C.white}});
    const btn = h("button",{style:{flex:"1",textAlign:"left",background:"transparent",border:"none",padding:"16px 10px 16px 18px",cursor:"pointer",minWidth:"0"},onclick:()=>openEmail(e)});
    const leftAccent = h("div",{style:{width:"3px",background:C.lavande,borderRadius:"2px",flexShrink:"0",margin:"8px 0"}});
    const inner = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}});
    const left = h("div",{style:{flex:"1",minWidth:"0"}});
    left.append(
      h("div",{style:{fontSize:"14px",fontWeight:"700",color:C.navy,marginBottom:"3px"}},e.fromName||e.from),
      h("div",{style:{fontSize:"12px",color:C.muted,lineHeight:"1.45",marginBottom:"4px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},e.subject),
      h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
        h("span",{style:{fontSize:"11px",color:C.muted}},new Date(e.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})),
        ...(e.attachments&&e.attachments.length>0?[h("span",{},"📎")]:[])
      )
    );
    const right = h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px",flexShrink:"0"}});
    right.append(h("span",{style:{fontSize:"11px",color:C.muted}},timeAgo(e.date)),h("span",{style:{fontSize:"18px",color:C.lavande,lineHeight:"1"}},"›"));
    inner.append(left,right);
    btn.append(inner);
    const isSaved = savedIds.includes(String(e.id));
    const saveBtn = h("button",{style:{flexShrink:"0",width:"36px",background:"transparent",border:"none",borderLeft:"1px solid "+C.border,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px",color:isSaved?C.lavande:C.muted},title:isSaved?"Retirer":"À traiter"},"🔖");
    saveBtn.style.opacity = isSaved?"1":"0.35";
    saveBtn.onclick = (ev) => {
      ev.stopPropagation();
      if(isSaved){ savedIds = savedIds.filter(x=>x!==String(e.id)); }
      else { savedIds.push(String(e.id)); }
      localStorage.setItem("ab_saved", JSON.stringify(savedIds));
      render();
    };
    const del = h("button",{style:{flexShrink:"0",width:"50px",background:"transparent",border:"none",borderLeft:"1px solid "+C.border,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px"},onclick:(ev)=>{ev.stopPropagation();deleteEmail(e.id);}},"🗑");
    del.addEventListener("mouseenter",()=>del.style.background="#FDECEA");
    del.addEventListener("mouseleave",()=>del.style.background="transparent");
    row.append(leftAccent,btn,saveBtn,del);
    list.append(row);
  });
  wrap.append(label, list);
  return wrap;
}

function renderDetail() {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",height:"100%",background:C.beige}});
  const urgKey = analysis?analysis.urgency:"moderee";
  const urg = URG[urgKey]||URG.moderee;

  const topbar = h("div",{style:{background:C.navy,flexShrink:"0"}});
  const topbarInner = h("div",{style:{padding:"14px 16px",display:"flex",alignItems:"center",gap:"10px"}});
  const backBtn = h("button",{style:{background:"rgba(255,255,255,0.12)",border:"none",cursor:"pointer",padding:"7px",lineHeight:"0",flexShrink:"0",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"},onclick:()=>{screen="list";render();}});
  const arrow = document.createElementNS("http://www.w3.org/2000/svg","svg");
  arrow.setAttribute("width","18");arrow.setAttribute("height","18");arrow.setAttribute("viewBox","0 0 24 24");arrow.setAttribute("fill","none");arrow.setAttribute("stroke","white");arrow.setAttribute("stroke-width","2.5");arrow.setAttribute("stroke-linecap","round");arrow.setAttribute("stroke-linejoin","round");
  const arrowPath = document.createElementNS("http://www.w3.org/2000/svg","polyline");arrowPath.setAttribute("points","15 18 9 12 15 6");
  arrow.append(arrowPath);backBtn.append(arrow);
  const titleWrap = h("div",{style:{flex:"1",minWidth:"0"}});
  titleWrap.append(
    h("div",{style:{fontSize:"13px",fontWeight:"700",color:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},selected.subject),
    h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.4)",marginTop:"2px"}},selected.fromName||selected.from)
  );
  topbarInner.append(backBtn,titleWrap);
  if (analysis) topbarInner.append(h("span",{style:{flexShrink:"0",padding:"2px 8px",borderRadius:"4px",fontSize:"9px",fontWeight:"700",background:urg.bg,color:urg.color,letterSpacing:"0.8px"}},urg.label));
  topbar.append(topbarInner);
  topbar.append(h("div",{style:{height:"3px",background:"linear-gradient(90deg,"+C.lavande+","+C.navy+")"}}));

  const tabs = h("div",{style:{display:"flex",background:C.white,borderBottom:"1px solid "+C.border,flexShrink:"0"}});
  [["mail","✉ Mail"],["analyse","🔍 Analyse"],["reply","✍ Réponse"]].forEach(([id,lbl])=>{
    const isActive = activeTab===id;
    tabs.append(h("button",{style:{flex:"1",padding:"12px 4px",border:"none",background:isActive?C.beige:C.white,color:isActive?C.navy:C.muted,fontSize:"12px",fontWeight:"600",cursor:"pointer",borderBottom:isActive?"2px solid "+C.navy:"2px solid transparent",transition:"all 0.15s"},onclick:()=>{activeTab=id;render();}},lbl));
  });

  const content = h("div",{style:{flex:"1",overflow:"hidden",display:"flex",flexDirection:"column"}});

  if (activeTab==="mail") {
    const p = h("div",{style:{padding:"18px 16px",display:"flex",flexDirection:"column",gap:"12px",overflowY:"auto",height:"100%"}});
    p.append(fieldBlock("De",selected.from));
    if (selected.attachments&&selected.attachments.length>0) p.append(fieldBlock("Pièce(s) jointe(s)","📎 "+selected.attachments.join(", ")));
    p.append(fieldBlock("Contenu",selected.body,true));
    content.append(p);
  }

  if (activeTab==="analyse") {
    const p = h("div",{style:{padding:"18px 16px",display:"flex",flexDirection:"column",gap:"12px",overflowY:"auto",height:"100%"}});
    if (loading) p.append(shimmerBlock(5));
    else if (analysis) {
      const badges = h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}});
      badges.append(
        h("span",{style:{padding:"3px 11px",borderRadius:"20px",fontSize:"11px",fontWeight:"700",background:C.navy,color:C.white}},analysis.category),
        h("span",{style:{padding:"3px 11px",borderRadius:"20px",fontSize:"11px",fontWeight:"700",background:urg.bg,color:urg.color}},urg.label)
      );
      p.append(badges,fieldBlock("Résumé",analysis.summary),fieldBlock("Ce qui est demandé",analysis.demand),fieldBlock("Action attendue",analysis.action));
    } else p.append(h("div",{style:{color:C.muted,fontSize:"13px"}},"Analyse en cours…"));
    content.append(p);
  }

  if (activeTab==="reply") {
    const p = h("div",{style:{padding:"12px 16px 12px",display:"flex",flexDirection:"column",gap:"10px",overflowY:"auto",flex:"1"}});
    if (selected) {
      const suggestedSubject = (analysis && analysis.subject) ? analysis.subject : selected.subject;
      const subjectBox = h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",background:C.navy,borderRadius:"8px",flexShrink:"0"}});
      const subjectText = h("div",{style:{flex:"1",fontSize:"12px",color:C.white,fontWeight:"600",minWidth:"0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},loading?"…":suggestedSubject);
      const copySubBtn = h("button",{style:{flexShrink:"0",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:"6px",padding:"4px 9px",fontSize:"11px",fontWeight:"600",color:C.white,cursor:"pointer",whiteSpace:"nowrap"}},"Copier");
      copySubBtn.onclick = () => {
        navigator.clipboard.writeText(suggestedSubject).catch(()=>{});
        copySubBtn.textContent = "✓"; copySubBtn.style.background="#2E7D52";
        setTimeout(()=>{ copySubBtn.textContent="Copier"; copySubBtn.style.background="rgba(255,255,255,0.15)"; }, 2000);
      };
      const regenSubBtn = h("button",{style:{flexShrink:"0",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:"6px",padding:"4px 8px",fontSize:"13px",color:C.white,cursor:loading?"not-allowed":"pointer",lineHeight:"1"},title:"Régénérer l'objet"},"↻");
      regenSubBtn.onclick = () => { if(loading||!analysis) return; subjectText.textContent="…"; doAnalyze(selected).then(ana=>{ analysis=ana; render(); }); };
      subjectBox.append(subjectText, copySubBtn, regenSubBtn);
      p.append(subjectBox);
    }
    const grid = h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px",flexShrink:"0"}});
    MODS.forEach((lbl,i)=>{
      const id=MOD_IDS[i],isActive=activeMod===id,disabled=replyLoading||loading||!reply;
      grid.append(h("button",{style:{padding:"0 4px",borderRadius:"7px",fontSize:"11px",fontWeight:"600",background:isActive?C.lavande:C.bgsoft,border:"1px solid "+(isActive?C.lavande:"#C8BFB5"),color:isActive?C.white:C.navy,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,transition:"all 0.15s",textAlign:"center",height:"32px"},onclick:()=>{if(!disabled)applyMod(id);}},lbl));
    });
    const replyBox = h("div",{style:{background:C.white,borderRadius:"10px",border:"1.5px solid #C8BFB5",padding:"14px 14px"}});
    if (replyLoading) replyBox.append(shimmerBlock(6));
    else if (reply) replyBox.append(h("pre",{style:{fontSize:"13px",lineHeight:"1.85",color:C.navy,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},reply));
    else replyBox.append(h("div",{style:{color:C.muted,fontSize:"13px"}},"Analyse en cours…"));
    p.append(grid,replyBox);
    content.append(p);
  }

  const bottomBar = h("div",{style:{padding:"10px 16px 16px",background:C.white,borderTop:"2px solid "+C.border,flexShrink:"0",display:"flex",flexDirection:"column",gap:"6px"}});
  if (activeTab==="reply") {
    const textarea = h("textarea",{style:{width:"100%",padding:"8px 12px",borderRadius:"8px",border:"1.5px solid #C8BFB5",fontSize:"12px",color:C.navy,fontFamily:"'DM Sans',sans-serif",background:"#EAE4DC",resize:"none",outline:"none",lineHeight:"1.5",display:"block"},placeholder:"Consigne pour réorienter la réponse…",rows:"2"});
    textarea.value = userInstruction;
    textarea.addEventListener("input", e => { userInstruction = e.target.value; });
    const regenBtn = h("button",{style:{width:"100%",height:"38px",borderRadius:"8px",fontSize:"12px",fontWeight:"600",background:"#EAE4DC",border:"1.5px solid #C8BFB5",color:C.navy,cursor:(replyLoading||loading)?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"},onclick:()=>{if(!replyLoading&&!loading)regenerate();}});
    regenBtn.append(h("span",{style:{display:"inline-block",animation:replyLoading?"spin 1s linear infinite":"none"}},"↻"),"Régénérer une réponse");
    const copyBtn = h("button",{style:{width:"100%",height:"44px",borderRadius:"8px",fontSize:"13px",fontWeight:"700",background:copied?"#2D7D52":(!reply||replyLoading)?"#C8BFB5":C.lavande,border:"none",color:(!reply||replyLoading)?"#8A7F75":C.white,cursor:(!reply||replyLoading)?"not-allowed":"pointer",letterSpacing:"0.5px",transition:"all 0.2s",fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif"},onclick:()=>{if(reply&&!replyLoading)doCopy();}},copied?"✓ COPIÉ !":"COPIER LA RÉPONSE");
    bottomBar.append(textarea,regenBtn,copyBtn);
  }

  wrap.append(topbar,tabs,content,bottomBar);
  return wrap;
}

// ── ATELIER ───────────────────────────────────────────────────────────────────
function renderAtelier() {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",height:"100%",background:C.beige}});

  // TYPE TOGGLE — Mail / SMS
  const typeRow = h("div",{style:{display:"flex",gap:"8px",padding:"14px 16px 0",flexShrink:"0"}});
  ["mail","sms"].forEach(t => {
    const lbl = t==="mail" ? "📧 Mail" : "💬 SMS";
    const isActive = atelierType===t;
    typeRow.append(h("button",{
      style:{flex:"1",padding:"10px",borderRadius:"9px",fontSize:"13px",fontWeight:"700",background:isActive?C.navy:"#EAE4DC",border:"1.5px solid "+(isActive?C.navy:"#C8BFB5"),color:isActive?C.white:C.navy,cursor:"pointer",transition:"all 0.15s"},
      onclick:()=>{atelierType=t;atelierResult="";atelierHistory=[];atelierHistoryIndex=-1;atelierActiveMod=null;render();}
    },lbl));
  });

  // MODE TOGGLE — Répondre / Reformuler
  const modeRow = h("div",{style:{display:"flex",gap:"8px",padding:"10px 16px 0",flexShrink:"0"}});
  [["repondre","↩ Répondre"],["reformuler","✦ Reformuler"]].forEach(([m,lbl])=>{
    const isActive = atelierMode===m;
    modeRow.append(h("button",{
      style:{flex:"1",padding:"8px",borderRadius:"9px",fontSize:"12px",fontWeight:"600",background:isActive?C.lavande:"#EAE4DC",border:"1.5px solid "+(isActive?C.lavande:"#C8BFB5"),color:isActive?C.white:C.navy,cursor:"pointer",transition:"all 0.15s"},
      onclick:()=>{atelierMode=m;atelierResult="";atelierHistory=[];atelierHistoryIndex=-1;atelierActiveMod=null;render();}
    },lbl));
  });

  // ZONE DE SAISIE
  const inputWrap = h("div",{style:{padding:"12px 16px 0",flexShrink:"0"}});
  const inputLabel = h("div",{style:{fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.3px",marginBottom:"6px"}},
    atelierType==="sms" ? "Votre SMS" : "Votre mail"
  );
  const textarea = h("textarea",{
    style:{width:"100%",padding:"12px 14px",borderRadius:"10px",border:"1.5px solid #C8BFB5",fontSize:"13px",color:C.navy,fontFamily:"'DM Sans',sans-serif",background:C.white,resize:"none",outline:"none",lineHeight:"1.6",display:"block",minHeight:atelierType==="sms"?"80px":"120px"},
    placeholder: atelierType==="sms" ? "Collez ou écrivez votre SMS ici…" : "Collez ou écrivez votre mail ici…",
    rows: atelierType==="sms" ? "4" : "6"
  });
  textarea.value = atelierInput;
  textarea.addEventListener("input", e => { atelierInput = e.target.value; });
  inputWrap.append(inputLabel, textarea);

  // CHAMP CONSIGNE
  const consigneWrap = h("div",{style:{padding:"8px 16px 0",flexShrink:"0"}});
  const consigneTA = h("textarea",{
    style:{width:"100%",padding:"8px 12px",borderRadius:"8px",border:"1.5px solid #C8BFB5",fontSize:"12px",color:C.navy,fontFamily:"'DM Sans',sans-serif",background:"#EAE4DC",resize:"none",outline:"none",lineHeight:"1.5",display:"block"},
    placeholder:"Consigne : plus court, plus commercial, ajouter un détail…",
    rows:"2"
  });
  consigneTA.value = atelierConsigne;
  consigneTA.addEventListener("input", e => { atelierConsigne = e.target.value; });
  consigneWrap.append(consigneTA);

  // BOUTONS — Générer + Régénérer
  const actionLabel = atelierMode==="repondre" ? "GÉNÉRER LA RÉPONSE" : "REFORMULER";
  const btnRow = h("div",{style:{display:"flex",gap:"8px",margin:"10px 16px 0",flexShrink:"0"}});

  const launchBtn = h("button",{
    style:{flex:"1",height:"44px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",background:atelierLoading?"#C8BFB5":C.lavande,border:"none",color:atelierLoading?"#8A7F75":C.white,cursor:atelierLoading?"not-allowed":"pointer",letterSpacing:"0.5px",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",transition:"all 0.2s",fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif"},
    onclick:()=>{if(!atelierLoading&&atelierInput.trim())launchAtelier();}
  });
  if (atelierLoading) {
    launchBtn.append(h("span",{style:{display:"inline-block",animation:"spin 1s linear infinite"}},"↻"),"Traitement…");
  } else {
    launchBtn.textContent = atelierHistory.length>0 ? "↻ RÉGÉNÉRER" : actionLabel;
  }

  btnRow.append(launchBtn);

  // RÉSULTAT
  const resultWrap = h("div",{style:{flex:"1",overflowY:"auto",padding:"12px 16px 0",display:"flex",flexDirection:"column",gap:"10px"}});
  const currentResult = atelierHistoryIndex>=0 ? atelierHistory[atelierHistoryIndex] : "";

  if (currentResult || atelierLoading) {
    // Boutons modificateurs
    const grid = h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px",flexShrink:"0"}});
    MODS.forEach((lbl,i)=>{
      const id=MOD_IDS[i],isActive=atelierActiveMod===id,disabled=atelierLoading||!currentResult;
      grid.append(h("button",{style:{padding:"0 4px",borderRadius:"7px",fontSize:"11px",fontWeight:"600",background:isActive?C.lavande:C.bgsoft,border:"1px solid "+(isActive?C.lavande:"#C8BFB5"),color:isActive?C.white:C.navy,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,transition:"all 0.15s",textAlign:"center",height:"32px"},onclick:()=>{if(!disabled)applyAtelierMod(id);}},lbl));
    });
    resultWrap.append(grid);

    // Navigation précédent/suivant
    if (atelierHistory.length>1) {
      const navRow = h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:"0"}});
      const prevBtn = h("button",{
        style:{padding:"6px 16px",borderRadius:"8px",fontSize:"12px",fontWeight:"600",background:atelierHistoryIndex>0?"#EAE4DC":"#F0EDE9",border:"1.5px solid #C8BFB5",color:atelierHistoryIndex>0?C.navy:C.muted,cursor:atelierHistoryIndex>0?"pointer":"not-allowed"},
        onclick:()=>{if(atelierHistoryIndex>0){atelierHistoryIndex--;atelierActiveMod=null;render();}}
      },"◀ Précédent");
      const counter = h("div",{style:{fontSize:"11px",fontWeight:"700",color:C.muted}},(atelierHistoryIndex+1)+" / "+atelierHistory.length);
      const nextBtn = h("button",{
        style:{padding:"6px 16px",borderRadius:"8px",fontSize:"12px",fontWeight:"600",background:atelierHistoryIndex<atelierHistory.length-1?"#EAE4DC":"#F0EDE9",border:"1.5px solid #C8BFB5",color:atelierHistoryIndex<atelierHistory.length-1?C.navy:C.muted,cursor:atelierHistoryIndex<atelierHistory.length-1?"pointer":"not-allowed"},
        onclick:()=>{if(atelierHistoryIndex<atelierHistory.length-1){atelierHistoryIndex++;atelierActiveMod=null;render();}}
      },"Suivant ▶");
      navRow.append(prevBtn, counter, nextBtn);
      resultWrap.append(navRow);
    }

    const box = h("div",{style:{background:C.white,borderRadius:"10px",border:"1.5px solid #C8BFB5",padding:"14px"}});
    if (atelierLoading) box.append(shimmerBlock(5));
    else box.append(h("pre",{style:{fontSize:"13px",lineHeight:"1.85",color:C.navy,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},currentResult));
    resultWrap.append(box);
  }

  // BOTTOM — Copier
  const bottomBar = h("div",{style:{padding:"10px 16px 16px",background:C.white,borderTop:"2px solid "+C.border,flexShrink:"0"}});
  if (currentResult && !atelierLoading) {
    const copyBtn = h("button",{
      style:{width:"100%",height:"44px",borderRadius:"8px",fontSize:"13px",fontWeight:"700",background:atelierCopied?"#2D7D52":C.lavande,border:"none",color:C.white,cursor:"pointer",letterSpacing:"0.5px",transition:"all 0.2s",fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif"},
      onclick:()=>{
        navigator.clipboard.writeText(currentResult).catch(()=>{});
        atelierCopied=true; render();
        setTimeout(()=>{ atelierCopied=false; render(); },2500);
      }
    },atelierCopied?"✓ COPIÉ !":"COPIER LE RÉSULTAT");
    bottomBar.append(copyBtn);
  }

  wrap.append(typeRow, modeRow, inputWrap, consigneWrap, btnRow, resultWrap, bottomBar);
  return wrap;
}

// ── ATELIER ACTIONS ───────────────────────────────────────────────────────────
async function launchAtelier() {
  if (!atelierInput.trim()) return;
  atelierLoading=true; atelierActiveMod=null; render();
  try {
    let res;
    if (atelierMode==="repondre") {
      res = await doAtelierRepondre(atelierInput+(atelierConsigne?"\n\nCONSIGNE : "+atelierConsigne:""), atelierType, null, null);
    } else {
      res = await doAtelierReformuler(atelierInput+(atelierConsigne?"\n\nCONSIGNE : "+atelierConsigne:""), atelierType, null, null);
    }
    atelierHistory.push(res);
    atelierHistoryIndex = atelierHistory.length-1;
    atelierResult = res;
  } catch(e) { }
  atelierLoading=false; render();
}

async function applyAtelierMod(mod) {
  const currentResult = atelierHistoryIndex>=0 ? atelierHistory[atelierHistoryIndex] : "";
  if (!currentResult) return;
  atelierActiveMod=mod; atelierLoading=true; render();
  try {
    let res;
    if (atelierMode==="repondre") {
      res = await doAtelierRepondre(atelierInput, atelierType, mod, currentResult);
    } else {
      res = await doAtelierReformuler(atelierInput, atelierType, mod, currentResult);
    }
    atelierHistory.push(res);
    atelierHistoryIndex = atelierHistory.length-1;
    atelierResult = res;
  } catch(e) {}
  atelierLoading=false; render();
}

// ── INBOX ACTIONS ─────────────────────────────────────────────────────────────
function openEmail(email) {
  selected=email; analysis=null; reply=""; activeMod=null; copied=false; activeTab="reply";
  screen="detail"; loading=true; render();
  doAnalyze(email).then(ana=>{
    analysis=ana; loading=false; replyLoading=true; render();
    return doReply(email,ana,null,null);
  }).then(rep=>{ reply=rep; replyLoading=false; render(); })
  .catch(()=>{ analysis={category:"Erreur",summary:"Impossible d'analyser",demand:"-",urgency:"faible",action:"-"}; reply="Une erreur est survenue."; loading=false; replyLoading=false; render(); });
}

function applyMod(mod) {
  if (!selected||!analysis||!reply) return;
  activeMod=mod; replyLoading=true; render();
  doReply(selected,analysis,mod,reply).then(rep=>{ reply=rep; replyLoading=false; render(); }).catch(()=>{ replyLoading=false; render(); });
}

function regenerate() {
  if (!selected||!analysis) return;
  activeMod=null; replyLoading=true; render();
  doReply(selected,analysis,null,null).then(rep=>{ reply=rep; replyLoading=false; render(); }).catch(()=>{ replyLoading=false; render(); });
}

function doCopy() {
  navigator.clipboard.writeText(reply).catch(()=>{});
  copied=true; render();
  setTimeout(()=>{ copied=false; render(); },2500);
}

function fieldBlock(lbl,val,isPre) {
  const wrap = h("div",{});
  wrap.append(h("div",{style:{fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.3px",marginBottom:"6px"}},lbl));
  const card = h("div",{style:{background:"#FFFFFF",borderRadius:"9px",border:"1px solid "+C.border,padding:"11px 13px",fontSize:"13px",color:"#162D49",lineHeight:"1.6"}});
  if (isPre) card.append(h("pre",{style:{fontSize:"13px",lineHeight:"1.9",color:"#162D49",whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},val));
  else card.textContent=val;
  wrap.append(card);
  return wrap;
}

loadEmails();
setInterval(loadEmails, 30000);
</script>
