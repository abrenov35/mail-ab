<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB RENOV MAIL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  :root{--navy:#162D49;--beige:#F3EAE2;--lavande:#A495C3;--muted:#8A9BAD;--border:#DDD5CA;--bgsoft:#EDE8E1;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;background:var(--beige);font-family:'DM Sans',sans-serif;}
  button{-webkit-appearance:none;font-family:inherit;cursor:pointer;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .shimmer-line{height:11px;border-radius:6px;background:linear-gradient(90deg,var(--border),var(--bgsoft),var(--border));background-size:200% 100%;animation:shimmer 1.5s infinite;}
  ::-webkit-scrollbar{display:none;}
  #app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--beige);overflow:hidden;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const RAILWAY = "https://mail-ab-production-bde8.up.railway.app";
const C = {navy:"#162D49",beige:"#F3EAE2",lavande:"#A495C3",white:"#FFFFFF",muted:"#8A9BAD",border:"#DDD5CA",bgsoft:"#EDE8E1"};
const URG = {critique:{color:"#C0392B",bg:"#FDECEA",label:"CRITIQUE"},haute:{color:"#B7591A",bg:"#FEF3E2",label:"HAUTE"},moderee:{color:"#162D49",bg:"#E8EFF6",label:"MODÉRÉE"},faible:{color:"#2E7D52",bg:"#EAF2EA",label:"FAIBLE"}};
const MODS = ["Plus court","Plus développé","Plus commercial","Plus technique"];
const MOD_IDS = ["shorter","longer","commercial","technical"];

let emails = [];
let savedIds = JSON.parse(localStorage.getItem("ab_saved")||"[]");
let screen = "list";
let selected = null;
let analysis = null;
let reply = "";
let loading = false;
let replyLoading = false;
let activeMod = null;
let copied = false;
let activeTab = "reply";
let userInstruction = "";

function timeAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 3600) return Math.round(s/60)+"m";
  if (s < 86400) return Math.round(s/3600)+"h";
  return Math.round(s/86400)+"j";
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c => c!=null && el.append(typeof c==="string"?c:c));
  return el;
}

function shimmerBlock(n) {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}});
  const ws=[85,65,90,55,78,60,88];
  for(let i=0;i<n;i++) wrap.append(h("div",{class:"shimmer-line",style:{width:ws[i%ws.length]+"%",animationDelay:(i*0.1)+"s"}}));
  return wrap;
}

async function callClaude(messages, system) {
  const r = await fetch(RAILWAY+"/claude", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system,messages})
  });
  const d = await r.json();
  return (d.content||[]).map(b=>b.text||"").join("");
}

async function doAnalyze(email) {
  const sys = 'Tu es AB MAIL. Reponds UNIQUEMENT en JSON valide sans markdown.\nFormat: {"category":"string (2 mots max)","summary":"string (max 10 mots)","demand":"string (max 8 mots)","urgency":"faible|moderee|haute|critique","action":"string (max 5 mots)","subject":"string (objet de reponse, 6 mots max, SANS prefixe Re: Fwd: TR:)"}';
  const txt = await callClaude([{role:"user",content:"De: "+email.from+"\nObjet: "+email.subject+"\n\n"+email.body}],sys);
  try { return JSON.parse(txt.replace(/```json|```/g,"").trim()); }
  catch { return {category:"Échange",summary:"Analyse indisponible",demand:"Voir le mail",urgency:"moderee",action:"Répondre",subject:email.subject}; }
}

async function doReply(email, ana, modifier, prev) {
  const sys = "Tu es AB MAIL, assistant commercial pour AB RENOV, entreprise de renovation. Regles ABSOLUES SANS EXCEPTION :\n- JAMAIS de signature\n- JAMAIS 'Cordialement' ni variantes\n- JAMAIS mielleux ni compliments\n- JAMAIS de nom de personne — impersonnel uniquement : 'nous traitons', 'une equipe', 'une intervention'\n- INTERDICTION TOTALE ET ABSOLUE de tout element temporel : aucune date, aucun jour (lundi, mardi...), aucune semaine, aucun mois, aucun delai chiffre (48h, 24h, J+3, sous X jours...), aucune expression comme 'semaine prochaine', 'rapidement', 'sous peu'. REMPLACER SYSTEMATIQUEMENT par : 'une date vous sera communiquee' ou 'nous revenons vers vous'. SI TU METS UNE DATE OU UN DELAI TU ENFREINS UNE REGLE CRITIQUE.\n- Aller dans le sens du client avec mesure\n- Style : professionnel, direct, commercial, bankable\n- Appliquer les consignes fournies EN PRIORITE avant de generer\n- Genere UNIQUEMENT le corps de la reponse pret a copier";
  const mmap = {shorter:"Raccourcis cette reponse",longer:"Developpe davantage",diplomatic:"Ton plus diplomatique",firm:"Ton plus ferme",commercial:"Angle commercial",technical:"Precisions techniques"};
  const content = (modifier&&prev)
    ? (mmap[modifier]||modifier)+" :\n\n"+prev
    : "Redige une reponse professionnelle.\nDe: "+email.from+"\nObjet: "+email.subject+"\n\n"+email.body+"\n\nContexte: "+ana.category+" — "+ana.summary
      +(userInstruction?"\n\nCONSIGNES A APPLIQUER EN PRIORITE (retraite la reponse en tenant compte de ces consignes avant tout) :\n"+userInstruction:"");
  return callClaude([{role:"user",content}],sys);
}

async function loadEmails() {
  try {
    const r = await fetch(RAILWAY+"/emails");
    emails = await r.json();
    render();
  } catch(e) {}
}

function deleteEmail(id) {
  emails = emails.filter(e => String(e.id) !== String(id));
  fetch(RAILWAY+"/email/"+id, { method:"DELETE" });
  render();
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (screen==="list") app.append(renderList());
  else app.append(renderDetail());
}

function renderList() {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",height:"100%"}});
  const header = h("div",{style:{background:C.navy,padding:"20px 18px 16px",flexShrink:"0"}});
  const topRow = h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});
  const logo = h("div",{style:{width:"36px",height:"36px",background:C.white,borderRadius:"7px",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif",fontWeight:"800",fontSize:"14px",color:C.navy,flexShrink:"0"}},"AB");
  const logoText = h("div",{});
  logoText.append(
    h("div",{style:{fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif",fontWeight:"700",fontSize:"15px",color:C.white,letterSpacing:"2px"}},"RENOV MAIL"),
    h("div",{style:{fontSize:"9px",color:"rgba(255,255,255,0.4)",letterSpacing:"1.2px"}},"ASSISTANT IA")
  );
  topRow.append(logo,logoText); header.append(topRow);
  const label = h("div",{style:{padding:"14px 18px 6px",fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.5px",flexShrink:"0"}},"Boîte de réception — "+emails.length);
  const list = h("div",{style:{flex:"1",overflowY:"auto"}});
  if (emails.length===0) list.append(h("div",{style:{padding:"52px 18px",textAlign:"center",color:C.muted,fontSize:"13px"}},"Aucun message"));
  emails.forEach(e => {
    const row = h("div",{style:{display:"flex",alignItems:"stretch",borderBottom:"1px solid "+C.border,background:C.white}});
    const btn = h("button",{style:{flex:"1",textAlign:"left",background:"transparent",border:"none",padding:"16px 10px 16px 18px",cursor:"pointer",minWidth:"0"},onclick:()=>openEmail(e)});
    const inner = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}});
    const left = h("div",{style:{flex:"1",minWidth:"0"}});
    left.append(
      h("div",{style:{fontSize:"14px",fontWeight:"700",color:C.navy,marginBottom:"3px"}},e.fromName||e.from),
      h("div",{style:{fontSize:"12px",color:C.muted,lineHeight:"1.45",marginBottom:"4px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},e.subject),
      h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
        h("span",{style:{fontSize:"11px",color:C.muted}},new Date(e.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})),
        ...(e.attachments&&e.attachments.length>0?[h("span",{},"📎")]:[])
      )
    );
    const right = h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px",flexShrink:"0"}});
    right.append(h("span",{style:{fontSize:"11px",color:C.muted}},timeAgo(e.date)),h("span",{style:{fontSize:"18px",color:C.border,lineHeight:"1"}},"›"));
    inner.append(left,right); btn.append(inner);
    const isSaved = savedIds.includes(String(e.id));
    const saveBtn = h("button",{style:{flexShrink:"0",width:"36px",background:"transparent",border:"none",borderLeft:"1px solid "+C.border,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px",color:isSaved?"#B7591A":C.muted},title:isSaved?"Retirer":"À traiter"},isSaved?"🔖":"🔖");
    saveBtn.style.opacity = isSaved?"1":"0.35";
    saveBtn.onclick = (ev) => {
      ev.stopPropagation();
      if(isSaved){ savedIds = savedIds.filter(x=>x!==String(e.id)); }
      else { savedIds.push(String(e.id)); }
      localStorage.setItem("ab_saved", JSON.stringify(savedIds));
      render();
    };
    const del = h("button",{style:{flexShrink:"0",width:"50px",background:"transparent",border:"none",borderLeft:"1px solid "+C.border,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px"},onclick:(ev)=>{ev.stopPropagation();deleteEmail(e.id);}},"🗑");
    del.addEventListener("mouseenter",()=>del.style.background="#FDECEA");
    del.addEventListener("mouseleave",()=>del.style.background="transparent");
    row.append(btn,saveBtn,del);
    list.append(row);
  });
  wrap.append(header,label,list);
  return wrap;
}

function renderDetail() {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",height:"100%",background:C.beige}});
  const urgKey = analysis?analysis.urgency:"moderee";
  const urg = URG[urgKey]||URG.moderee;
  const topbar = h("div",{style:{background:C.navy,padding:"14px 16px",display:"flex",alignItems:"center",gap:"10px",flexShrink:"0"}});
  const backBtn = h("button",{style:{background:"rgba(255,255,255,0.12)",border:"none",cursor:"pointer",padding:"7px",lineHeight:"0",flexShrink:"0",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"},onclick:()=>{screen="list";render();}});
  const arrow = document.createElementNS("http://www.w3.org/2000/svg","svg");
  arrow.setAttribute("width","18");arrow.setAttribute("height","18");arrow.setAttribute("viewBox","0 0 24 24");arrow.setAttribute("fill","none");arrow.setAttribute("stroke","white");arrow.setAttribute("stroke-width","2.5");arrow.setAttribute("stroke-linecap","round");arrow.setAttribute("stroke-linejoin","round");
  const arrowPath = document.createElementNS("http://www.w3.org/2000/svg","polyline");arrowPath.setAttribute("points","15 18 9 12 15 6");
  arrow.append(arrowPath);backBtn.append(arrow);
  const titleWrap = h("div",{style:{flex:"1",minWidth:"0"}});
  titleWrap.append(
    h("div",{style:{fontSize:"13px",fontWeight:"700",color:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},selected.subject),
    h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.4)",marginTop:"2px"}},selected.fromName||selected.from)
  );
  topbar.append(backBtn,titleWrap);
  if (analysis) topbar.append(h("span",{style:{flexShrink:"0",padding:"2px 8px",borderRadius:"4px",fontSize:"9px",fontWeight:"700",background:urg.bg,color:urg.color,letterSpacing:"0.8px"}},urg.label));
  const tabs = h("div",{style:{display:"flex",background:C.white,borderBottom:"1px solid "+C.border,flexShrink:"0"}});
  [["mail","✉ Mail"],["analyse","🔍 Analyse"],["reply","✍ Réponse"]].forEach(([id,lbl])=>{
    tabs.append(h("button",{style:{flex:"1",padding:"13px 4px",border:"none",background:activeTab===id?C.beige:C.white,color:activeTab===id?C.navy:C.muted,fontSize:"12px",fontWeight:"600",cursor:"pointer",borderBottom:activeTab===id?"2px solid "+C.navy:"2px solid transparent",transition:"all 0.15s"},onclick:()=>{activeTab=id;render();}},lbl));
  });
  const content = h("div",{style:{flex:"1",overflowY:"auto",overflowX:"hidden"}});
  if (activeTab==="mail") {
    const p = h("div",{style:{padding:"18px 16px",display:"flex",flexDirection:"column",gap:"12px"}});
    p.append(fieldBlock("De",selected.from));
    if (selected.attachments&&selected.attachments.length>0) p.append(fieldBlock("Pièce(s) jointe(s)","📎 "+selected.attachments.join(", ")));
    p.append(fieldBlock("Contenu",selected.body,true));
    content.append(p);
  }
  if (activeTab==="analyse") {
    const p = h("div",{style:{padding:"18px 16px",display:"flex",flexDirection:"column",gap:"12px"}});
    if (loading) p.append(shimmerBlock(5));
    else if (analysis) {
      const badges = h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}});
      badges.append(
        h("span",{style:{padding:"3px 11px",borderRadius:"20px",fontSize:"11px",fontWeight:"700",background:C.navy,color:C.white}},analysis.category),
        h("span",{style:{padding:"3px 11px",borderRadius:"20px",fontSize:"11px",fontWeight:"700",background:urg.bg,color:urg.color}},urg.label)
      );
      p.append(badges,fieldBlock("Résumé",analysis.summary),fieldBlock("Ce qui est demandé",analysis.demand),fieldBlock("Action attendue",analysis.action));
    } else p.append(h("div",{style:{color:C.muted,fontSize:"13px"}},"Analyse en cours…"));
    content.append(p);
  }
  if (activeTab==="reply") {
    const p = h("div",{style:{padding:"16px 16px 0"}});
    if (selected) {
      const suggestedSubject = (analysis && analysis.subject) ? analysis.subject : selected.subject;
      let subjectCopied = false;
      const subjectBox = h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"11px 14px",marginBottom:"12px",background:C.navy,borderRadius:"8px"}});
      const subjectText = h("div",{style:{flex:"1",fontSize:"12px",color:C.white,fontWeight:"600",minWidth:"0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},loading?"…":suggestedSubject);
      const copySubBtn = h("button",{style:{flexShrink:"0",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:"6px",padding:"4px 9px",fontSize:"11px",fontWeight:"600",color:C.white,cursor:"pointer",whiteSpace:"nowrap"}},loading?"…":"Copier");
      copySubBtn.onclick = () => {
        navigator.clipboard.writeText(suggestedSubject).catch(()=>{});
        copySubBtn.textContent = "✓";
        copySubBtn.style.background = "#EAF2EA";
        copySubBtn.style.color = "#2E7D52";
        setTimeout(()=>{ copySubBtn.textContent = "Copier"; copySubBtn.style.background = "rgba(255,255,255,0.15)"; copySubBtn.style.color = C.white; }, 2000);
      };
      const regenSubBtn = h("button",{style:{flexShrink:"0",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:"6px",padding:"4px 8px",fontSize:"13px",color:C.white,cursor:loading?"not-allowed":"pointer",lineHeight:"1"},title:"Régénérer l'objet"},"↻");
      regenSubBtn.onclick = () => {
        if(loading||!analysis) return;
        subjectText.textContent = "…";
        doAnalyze(selected).then(ana => { analysis = ana; render(); });
      };
      subjectBox.append(subjectText, copySubBtn, regenSubBtn);
      p.append(subjectBox);
    }
    const grid = h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px",marginBottom:"14px"}});
    MODS.forEach((lbl,i)=>{
      const id=MOD_IDS[i],isActive=activeMod===id,disabled=replyLoading||loading||!reply;
      grid.append(h("button",{style:{padding:"7px 6px",borderRadius:"7px",fontSize:"11px",fontWeight:"500",background:isActive?C.lavande:C.white,border:"1px solid "+(isActive?C.lavande:C.border),color:isActive?C.white:C.navy,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,transition:"all 0.15s",textAlign:"center"},onclick:()=>{if(!disabled)applyMod(id);}},lbl));
    });
    const replyBox = h("div",{style:{background:C.white,borderRadius:"10px",border:"1px solid "+C.border,padding:"14px",marginBottom:"0",minHeight:"80px"}});
    if (replyLoading) replyBox.append(shimmerBlock(6));
    else if (reply) replyBox.append(h("pre",{style:{fontSize:"13px",lineHeight:"1.95",color:C.navy,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},reply));
    else replyBox.append(h("div",{style:{color:C.muted,fontSize:"13px"}},"Analyse en cours…"));
    p.append(grid,replyBox);
    p.style.paddingBottom = "0";
    content.append(p);
  }
  const bottomBar = h("div",{style:{padding:"16px 16px 20px",background:C.white,borderTop:"2px solid "+C.border,flexShrink:"0",display:"flex",flexDirection:"column",gap:"9px"}});
  if (activeTab==="reply") {
    const textarea = h("textarea",{style:{width:"100%",padding:"10px 12px",borderRadius:"8px",border:"1px solid "+C.border,fontSize:"12px",color:C.navy,fontFamily:"'DM Sans',sans-serif",background:"#E4DDD6",resize:"none",outline:"none",lineHeight:"1.5"},placeholder:"Consigne pour réorienter la réponse…",rows:"3"});
    textarea.value = userInstruction;
    textarea.addEventListener("input", e => { userInstruction = e.target.value; });
    const regenBtn = h("button",{style:{width:"100%",padding:"12px",borderRadius:"8px",fontSize:"13px",fontWeight:"600",background:C.bgsoft,border:"1px solid "+C.border,color:C.navy,cursor:(replyLoading||loading)?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"},onclick:()=>{if(!replyLoading&&!loading)regenerate();}});
    regenBtn.append(h("span",{style:{display:"inline-block",animation:replyLoading?"spin 1s linear infinite":"none"}},"↻"),"Régénérer une réponse");
    const copyBtn = h("button",{style:{width:"100%",padding:"14px",borderRadius:"8px",fontSize:"13px",fontWeight:"700",background:copied?"#2D7D52":(!reply||replyLoading)?C.bgsoft:C.navy,border:"none",color:(!reply||replyLoading)?C.muted:C.white,cursor:(!reply||replyLoading)?"not-allowed":"pointer",letterSpacing:"0.5px",transition:"all 0.2s",fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif"},onclick:()=>{if(reply&&!replyLoading)doCopy();}},copied?"✓ COPIÉ !":"COPIER LA RÉPONSE");
    bottomBar.append(textarea,regenBtn,copyBtn,h("div",{style:{fontSize:"10px",color:C.muted,textAlign:"center"}},"Collez dans votre messagerie et envoyez"));
  }
  wrap.append(topbar,tabs,content,bottomBar);
  return wrap;
}

function fieldBlock(lbl,val,isPre) {
  const wrap = h("div",{});
  wrap.append(h("div",{style:{fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.3px",marginBottom:"6px"}},lbl));
  const card = h("div",{style:{background:"#FFFFFF",borderRadius:"9px",border:"1px solid "+C.border,padding:"11px 13px",fontSize:"13px",color:"#162D49",lineHeight:"1.6"}});
  if (isPre) card.append(h("pre",{style:{fontSize:"13px",lineHeight:"1.9",color:"#162D49",whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},val));
  else card.textContent=val;
  wrap.append(card);
  return wrap;
}

function openEmail(email) {
  selected=email; analysis=null; reply=""; activeMod=null; copied=false; activeTab="reply";
  screen="detail"; loading=true; render();
  doAnalyze(email).then(ana=>{
    analysis=ana; loading=false; replyLoading=true; render();
    return doReply(email,ana,null,null);
  }).then(rep=>{ reply=rep; replyLoading=false; render(); })
  .catch(()=>{ analysis={category:"Erreur",summary:"Impossible d'analyser",demand:"-",urgency:"faible",action:"-"}; reply="Une erreur est survenue."; loading=false; replyLoading=false; render(); });
}

function applyMod(mod) {
  if (!selected||!analysis||!reply) return;
  activeMod=mod; replyLoading=true; render();
  doReply(selected,analysis,mod,reply).then(rep=>{ reply=rep; replyLoading=false; render(); }).catch(()=>{ replyLoading=false; render(); });
}

function regenerate() {
  if (!selected||!analysis) return;
  activeMod=null; replyLoading=true; render();
  doReply(selected,analysis,null,null).then(rep=>{ reply=rep; replyLoading=false; render(); }).catch(()=>{ replyLoading=false; render(); });
}

function doCopy() {
  navigator.clipboard.writeText(reply).catch(()=>{});
  copied=true; render();
  setTimeout(()=>{ copied=false; render(); },2500);
}

loadEmails();
setInterval(loadEmails, 30000);
</script>
</body>
</html>
