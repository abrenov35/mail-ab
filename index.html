// ── UTILS ──────────────────────────────────────────────────────────────────────
function timeAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 3600) return Math.round(s/60)+"m";
  if (s < 86400) return Math.round(s/3600)+"h";
  return Math.round(s/86400)+"j";
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c => c!=null && el.append(typeof c==="string"?c:c));
  return el;
}

function shimmerBlock(n) {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}});
  const ws=[85,65,90,55,78,60,88];
  for(let i=0;i<n;i++) wrap.append(h("div",{class:"shimmer-line",style:{width:ws[i%ws.length]+"%",animationDelay:(i*0.1)+"s"}}));
  return wrap;
}

// ── CLAUDE API ─────────────────────────────────────────────────────────────────
async function callClaude(messages, system) {
  const r = await fetch(RAILWAY+"/claude", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system,messages})
  });
  const d = await r.json();
  return (d.content||[]).map(b=>b.text||"").join("");
}

async function doAnalyze(email) {
  const sys = 'Tu es AB MAIL. Reponds UNIQUEMENT en JSON valide sans markdown.\nFormat: {"category":"string (2 mots max)","summary":"string (max 10 mots)","demand":"string (max 8 mots)","urgency":"faible|moderee|haute|critique","action":"string (max 5 mots)","subject":"string (objet de reponse, 6 mots max, SANS prefixe Re: Fwd: TR:)"}';
  const txt = await callClaude([{role:"user",content:"De: "+email.from+"\nObjet: "+email.subject+"\n\n"+email.body}],sys);
  try { return JSON.parse(txt.replace(/```json|```/g,"").trim()); }
  catch { return {category:"Échange",summary:"Analyse indisponible",demand:"Voir le mail",urgency:"moderee",action:"Répondre",subject:email.subject}; }
}

// ── DATA ───────────────────────────────────────────────────────────────────────
async function loadEmails() {
  try {
    const r = await fetch(RAILWAY+"/emails");
    emails = await r.json();
    render();
  } catch(e) {}
}

function deleteEmail(id) {
  emails = emails.filter(e => String(e.id) !== String(id));
  fetch(RAILWAY+"/email/"+id, { method:"DELETE" });
  render();
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.append(renderApp());
}

function renderApp() {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",height:"100%"}});

  // HEADER
  const header = h("div",{style:{background:C.navy,flexShrink:"0"}});
  const headerInner = h("div",{style:{padding:"16px 18px 12px",display:"flex",alignItems:"center"}});
  const logo = h("div",{style:{flex:"1"}});
  logo.append(
    h("div",{style:{fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif",fontWeight:"800",fontSize:"17px",color:C.white,letterSpacing:"1px",lineHeight:"1"}},"AB RENOV 35"),
    h("div",{style:{fontSize:"9px",color:C.lavande,letterSpacing:"2px",fontWeight:"600",textTransform:"uppercase",marginTop:"2px"}},"RENOV MAIL")
  );
  headerInner.append(logo);
  header.append(headerInner);
  header.append(h("div",{style:{height:"3px",background:"linear-gradient(90deg,"+C.lavande+","+C.lavandeDark+","+C.navy+")"}}));

  // ONGLETS PRINCIPAUX
  const mainTabs = h("div",{style:{display:"flex",background:C.white,borderBottom:"1px solid "+C.border,flexShrink:"0"}});
  [["inbox","📬 Boîte mail"],["atelier","✏️ Atelier"]].forEach(([id,lbl])=>{
    const isActive = mainTab===id;
    mainTabs.append(h("button",{
      style:{flex:"1",padding:"13px 4px",border:"none",background:isActive?C.navy:C.white,color:isActive?C.white:C.muted,fontSize:"13px",fontWeight:"700",cursor:"pointer",borderBottom:isActive?"3px solid "+C.lavande:"3px solid transparent",transition:"all 0.15s"},

    },lbl));

  const body = h("div",{style:{flex:"1",overflow:"hidden",display:"flex",flexDirection:"column"}});
  if (mainTab==="inbox") {
    if (screen==="list") body.append(renderList());
    else body.append(renderDetail());
  } else {
    body.append(renderAtelier());
  }

  wrap.append(header, mainTabs, body);

}

// ── INBOX LIST ─────────────────────────────────────────────────────────────────
function renderList() {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",height:"100%",background:C.white}});
  const label = h("div",{style:{padding:"12px 18px 8px",fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.5px",flexShrink:"0",borderBottom:"1px solid "+C.border}},"Boîte de réception — "+emails.length);
  const list = h("div",{style:{flex:"1",overflowY:"auto",background:C.white}});
  if (emails.length===0) list.append(h("div",{style:{padding:"52px 18px",textAlign:"center",color:C.muted,fontSize:"13px"}},"Aucun message"));

  emails.forEach(e => {
    const row = h("div",{style:{display:"flex",alignItems:"stretch",borderBottom:"1px solid "+C.border,background:C.white}});
    const leftAccent = h("div",{style:{width:"3px",background:C.lavande,flexShrink:"0"}});
    const btn = h("button",{style:{flex:"1",textAlign:"left",background:"transparent",border:"none",padding:"14px 10px 14px 14px",cursor:"pointer",minWidth:"0"},onclick:()=>openEmail(e)});
    const inner = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}});
    const left = h("div",{style:{flex:"1",minWidth:"0"}});
    left.append(
      h("div",{style:{fontSize:"14px",fontWeight:"700",color:C.navy,marginBottom:"2px"}},e.fromName||e.from),
      h("div",{style:{fontSize:"12px",color:C.muted,marginBottom:"4px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},e.subject),
      h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},
        h("span",{style:{fontSize:"11px",color:C.muted}},new Date(e.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})),
        ...(e.attachments&&e.attachments.length>0?[h("span",{},"📎")]:[])
      )
    );
    const right = h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px",flexShrink:"0"}});
    right.append(h("span",{style:{fontSize:"11px",color:C.muted}},timeAgo(e.date)),h("span",{style:{fontSize:"18px",color:C.lavande}},"›"));
    inner.append(left,right);
    btn.append(inner);

    const isSaved = savedIds.includes(String(e.id));
    const saveBtn = h("button",{style:{flexShrink:"0",width:"36px",background:"transparent",border:"none",borderLeft:"1px solid "+C.border,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px",opacity:isSaved?"1":"0.3"},onclick:(ev)=>{
      ev.stopPropagation();
      if(isSaved){ savedIds = savedIds.filter(x=>x!==String(e.id)); }
      else { savedIds.push(String(e.id)); }
      localStorage.setItem("ab_saved", JSON.stringify(savedIds));
      render();
    }},"🔖");
    const del = h("button",{style:{flexShrink:"0",width:"44px",background:"transparent",border:"none",borderLeft:"1px solid "+C.border,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px"},onclick:(ev)=>{ev.stopPropagation();deleteEmail(e.id);}},"🗑");
    del.addEventListener("mouseenter",()=>del.style.background="#FDECEA");
    del.addEventListener("mouseleave",()=>del.style.background="transparent");
    row.append(leftAccent,btn,saveBtn,del);
    list.append(row);
  });
  wrap.append(label, list);
  return wrap;
}

// ── INBOX DETAIL ───────────────────────────────────────────────────────────────
function renderDetail() {
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",height:"100%",background:C.white}});
  const urgKey = analysis?analysis.urgency:"moderee";
  const urg = URG[urgKey]||URG.moderee;

  const arrowPath = document.createElementNS("http://www.w3.org/2000/svg","polyline");arrowPath.setAttribute("points","15 18 9 12 15 6");

  });

  const content = h("div",{style:{flex:"1",overflow:"hidden",display:"flex",flexDirection:"column",background:C.bgsoft}});

    p.append(fieldBlock("De",selected.from));
    if (selected.attachments&&selected.attachments.length>0) p.append(fieldBlock("Pièce(s) jointe(s)","📎 "+selected.attachments.join(", ")));
    p.append(fieldBlock("Contenu",selected.body,true));
    content.append(p);
  }

  if (activeTab==="analyse") {
    const p = h("div",{style:{padding:"16px",display:"flex",flexDirection:"column",gap:"12px",overflowY:"auto",height:"100%"}});
    if (loading) p.append(shimmerBlock(5));
    else if (analysis) {
      const badges = h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}});

        h("span",{style:{padding:"3px 11px",borderRadius:"20px",fontSize:"11px",fontWeight:"700",background:C.navy,color:C.white}},analysis.category),
        h("span",{style:{padding:"3px 11px",borderRadius:"20px",fontSize:"11px",fontWeight:"700",background:urg.bg,color:urg.color}},urg.label)
      );
      p.append(badges,fieldBlock("Résumé",analysis.summary),fieldBlock("Ce qui est demandé",analysis.demand),fieldBlock("Action attendue",analysis.action));
    }
    content.append(p);
  }

  if (activeTab==="reply") {
    const p = h("div",{style:{padding:"12px 14px",display:"flex",flexDirection:"column",gap:"10px",overflowY:"auto",flex:"1"}});
    if (selected) {
      const suggestedSubject = (analysis&&analysis.subject)?analysis.subject:selected.subject;
      const subjectBox = h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"10px 14px",background:C.navy,borderRadius:"8px",flexShrink:"0"}});
      const subjectText = h("div",{style:{flex:"1",fontSize:"12px",color:C.white,fontWeight:"600",minWidth:"0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},loading?"…":suggestedSubject);
      const copySubBtn = h("button",{style:{flexShrink:"0",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:"6px",padding:"4px 9px",fontSize:"11px",fontWeight:"600",color:C.white,cursor:"pointer",whiteSpace:"nowrap"}},"Copier");
      copySubBtn.onclick = () => {
        navigator.clipboard.writeText(suggestedSubject).catch(()=>{});
        copySubBtn.textContent="✓"; copySubBtn.style.background="#2E7D52";
        setTimeout(()=>{ copySubBtn.textContent="Copier"; copySubBtn.style.background="rgba(255,255,255,0.15)"; },2000);
      };

    // Boutons modif
    const grid = h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",flexShrink:"0"}});
    MODS.forEach((lbl,i)=>{
      const id=MOD_IDS[i],isActive=activeMod===id,disabled=replyLoading||loading||!reply;
      grid.append(h("button",{style:{padding:"0 4px",borderRadius:"7px",fontSize:"11px",fontWeight:"600",background:isActive?C.lavande:C.white,border:"1.5px solid "+(isActive?C.lavande:C.border),color:isActive?C.white:C.navy,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,height:"34px"},onclick:()=>{if(!disabled)applyMod(id);}},lbl));
    });
    const replyBox = h("div",{style:{background:C.white,borderRadius:"10px",border:"1px solid "+C.border,padding:"14px"}});
    if (replyLoading) replyBox.append(shimmerBlock(6));
    else if (reply) replyBox.append(h("pre",{style:{fontSize:"13px",lineHeight:"1.8",color:C.navy,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},reply));
    else replyBox.append(h("div",{style:{color:C.muted,fontSize:"13px"}},"Analyse en cours…"));
    p.append(grid,replyBox);
    content.append(p);
  }

  // Barre du bas
  const bottomBar = h("div",{style:{padding:"10px 14px 14px",background:C.white,borderTop:"1px solid "+C.border,flexShrink:"0",display:"flex",flexDirection:"column",gap:"8px"}});
  if (activeTab==="reply") {
    const textarea = h("textarea",{style:{width:"100%",padding:"8px 12px",borderRadius:"8px",border:"1.5px solid "+C.border,fontSize:"12px",color:C.navy,fontFamily:"'DM Sans',sans-serif",background:C.bgsoft,resize:"none",outline:"none",lineHeight:"1.5"},placeholder:"Consigne pour réorienter la réponse…",rows:"2"});
    textarea.value = userInstruction;
    textarea.addEventListener("input", e => { userInstruction = e.target.value; });
    const regenBtn = h("button",{style:{width:"100%",height:"36px",borderRadius:"8px",fontSize:"12px",fontWeight:"600",background:C.bgsoft,border:"1.5px solid "+C.border,color:C.navy,cursor:(replyLoading||loading)?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"},onclick:()=>{if(!replyLoading&&!loading)regenerate();}});
    regenBtn.append(h("span",{style:{display:"inline-block",animation:replyLoading?"spin 1s linear infinite":"none"}},"↻"),"Régénérer");
    const copyBtn = h("button",{style:{width:"100%",height:"44px",borderRadius:"8px",fontSize:"13px",fontWeight:"700",background:copied?C.green:(!reply||replyLoading)?C.border:C.navy,border:"none",color:(!reply||replyLoading)?"#8A7F75":C.white,cursor:(!reply||replyLoading)?"not-allowed":"pointer",letterSpacing:"0.5px",transition:"all 0.2s",fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif"},onclick:()=>{if(reply&&!replyLoading)doCopy();}},copied?"✓ COPIÉ !":"COPIER LA RÉPONSE");
    bottomBar.append(textarea,regenBtn,copyBtn);
  }

  wrap.append(topbar,tabs,content,bottomBar);
  return wrap;
}

// ── ATELIER ─────────────────────────────────────────────────────────────────────
function renderAtelier() {
  // 2 écrans : SAISIE ou RESULTAT
  const currentResult = atelierHistoryIndex>=0 ? atelierHistory[atelierHistoryIndex] : "";
  const isSms = atelierType==="sms";
  const wrap = h("div",{style:{display:"flex",flexDirection:"column",height:"100%",background:C.beige}});

  if (!currentResult && atelierGuideStep!=="questions") {
    // ── ÉCRAN SAISIE ──
    const topToggles = h("div",{style:{padding:"12px 14px 0",display:"flex",flexDirection:"column",gap:"8px",flexShrink:"0"}});

    // Mail / SMS
    const typeRow = h("div",{style:{display:"flex",gap:"8px"}});
    ["mail","sms"].forEach(t => {
      const isA = atelierType===t;
      typeRow.append(h("button",{
        style:{flex:"1",height:"40px",borderRadius:"9px",fontSize:"13px",fontWeight:"700",background:isA?C.navy:C.white,border:"2px solid "+(isA?C.navy:C.border),color:isA?C.white:C.navy,cursor:"pointer",transition:"all 0.15s"},
        onclick:()=>{atelierType=t;render();}
      },t==="mail"?"📧 Mail":"💬 SMS"));
    });

    // Répondre / Reformuler
    const modeRow = h("div",{style:{display:"flex",gap:"8px"}});
    [["repondre","↩ Répondre"],["reformuler","✦ Reformuler"]].forEach(([m,lbl])=>{
      const isA = atelierMode===m;
      modeRow.append(h("button",{
        style:{flex:"1",height:"40px",borderRadius:"9px",fontSize:"13px",fontWeight:"700",background:isA?C.lavande:C.white,border:"2px solid "+(isA?C.lavandeDark:C.border),color:isA?C.white:C.navy,cursor:"pointer",transition:"all 0.15s"},
        onclick:()=>{atelierMode=m;render();}
      },lbl));
    });
    topToggles.append(typeRow, modeRow);

    // Zone texte — flex:1 pour remplir l'espace
    const inputWrap = h("div",{style:{padding:"10px 14px",display:"flex",flexDirection:"column",gap:"6px",flexShrink:"0"}});
    inputWrap.append(h("div",{style:{fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.3px"}},isSms?"Votre SMS":"Votre mail"));
    const ta = h("textarea",{
      style:{width:"100%",height:"160px",padding:"12px 14px",borderRadius:"10px",border:"1.5px solid "+C.border,fontSize:"13px",color:C.navy,fontFamily:"'DM Sans',sans-serif",background:C.white,resize:"none",outline:"none",lineHeight:"1.6"},
      placeholder:isSms?"Collez ou écrivez votre SMS ici…":"Collez ou écrivez votre mail ici…"
    });
    ta.value = atelierInput;
    ta.addEventListener("input", e => { atelierInput = e.target.value; });
    ta.addEventListener("keydown", e => { e.stopPropagation(); });
    inputWrap.append(ta);

    // Barre du bas — 2 boutons
    const bottom = h("div",{style:{padding:"10px 14px 16px",background:C.white,borderTop:"1px solid "+C.border,flexShrink:"0",display:"flex",gap:"8px"}});
    const rapide = h("button",{
      style:{flex:"1",height:"48px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",background:atelierLoading?C.border:C.lavande,border:"none",color:C.white,cursor:atelierLoading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"},
      onclick:()=>{if(!atelierLoading&&atelierInput.trim())launchAtelier();}
    });
    if (atelierLoading) rapide.append(h("span",{style:{display:"inline-block",animation:"spin 1s linear infinite"}},"↻"),"Traitement…");
    else rapide.append("⚡ Rapide");

    const guide = h("button",{
      style:{flex:"1",height:"48px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",background:atelierLoading?C.border:C.navy,border:"none",color:C.white,cursor:atelierLoading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"},
      onclick:()=>{if(!atelierLoading&&atelierInput.trim())launchGuide();}
    },"🎯 Guidé");

    bottom.append(rapide, guide);
    wrap.append(topToggles, inputWrap, bottom);

  } else if (atelierGuideStep==="questions") {
    // ── ÉCRAN QUESTIONS ──
    const qWrap = h("div",{style:{padding:"14px",display:"flex",flexDirection:"column",gap:"10px",flexShrink:"0"}});
    qWrap.append(h("div",{style:{fontSize:"10px",fontWeight:"700",color:C.navy,textTransform:"uppercase",letterSpacing:"1.3px"}},"🎯 Questions pour affiner"));
    const qBox = h("div",{style:{background:C.white,borderRadius:"10px",border:"1px solid "+C.border,padding:"14px",fontSize:"13px",lineHeight:"1.7",color:C.navy}});
    qBox.append(h("pre",{style:{whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},atelierQuestions));
    const aTA = h("textarea",{
      style:{width:"100%",height:"80px",padding:"10px 12px",borderRadius:"10px",border:"2px solid "+C.navy,fontSize:"13px",color:C.navy,fontFamily:"'DM Sans',sans-serif",background:C.white,resize:"none",outline:"none",lineHeight:"1.6"},
      placeholder:"Vos réponses…"
    });
    aTA.value = atelierAnswers;
    aTA.addEventListener("input", e => { atelierAnswers = e.target.value; });
    aTA.addEventListener("keydown", e => { e.stopPropagation(); });
    qWrap.append(qBox, aTA);
    wrap.append(qWrap);

    const bottom = h("div",{style:{padding:"10px 14px 16px",background:C.white,borderTop:"1px solid "+C.border,flexShrink:"0",display:"flex",gap:"8px"}});
    const retour = h("button",{
      style:{height:"48px",padding:"0 16px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",background:C.bgsoft,border:"1.5px solid "+C.border,color:C.navy,cursor:"pointer"},
      onclick:()=>{atelierGuideStep="idle";render();}
    },"← Retour");
    const genBtn = h("button",{
      style:{flex:"1",height:"48px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",background:atelierLoading?C.border:C.lavande,border:"none",color:C.white,cursor:atelierLoading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"},
      onclick:()=>{if(!atelierLoading&&atelierAnswers.trim())launchWithAnswers();}
    });
    if (atelierLoading) genBtn.append(h("span",{style:{display:"inline-block",animation:"spin 1s linear infinite"}},"↻"),"Traitement…");
    else genBtn.append("✦ Générer");
    bottom.append(retour, genBtn);
    wrap.append(bottom);

  } else {
    // ── ÉCRAN RÉSULTAT ──
    const isSmsRes = atelierType==="sms";

    // Nav précédent/suivant si besoin
    const resWrap = h("div",{style:{flex:"1",overflowY:"auto",padding:"12px 14px 0",display:"flex",flexDirection:"column",gap:"8px"}});

    if (atelierHistory.length>1) {
      const nav = h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}});
      const prev = h("button",{
        style:{padding:"6px 14px",borderRadius:"8px",fontSize:"12px",fontWeight:"600",background:atelierHistoryIndex>0?C.white:C.bgsoft,border:"1.5px solid "+(atelierHistoryIndex>0?C.navy:C.border),color:atelierHistoryIndex>0?C.navy:C.muted,cursor:atelierHistoryIndex>0?"pointer":"not-allowed"},
        onclick:()=>{if(atelierHistoryIndex>0){atelierHistoryIndex--;render();}}
      },"◀ Préc.");
      const ctr = h("div",{style:{fontSize:"12px",fontWeight:"700",color:C.navy}},(atelierHistoryIndex+1)+" / "+atelierHistory.length);
      const next = h("button",{
        style:{padding:"6px 14px",borderRadius:"8px",fontSize:"12px",fontWeight:"600",background:atelierHistoryIndex<atelierHistory.length-1?C.white:C.bgsoft,border:"1.5px solid "+(atelierHistoryIndex<atelierHistory.length-1?C.navy:C.border),color:atelierHistoryIndex<atelierHistory.length-1?C.navy:C.muted,cursor:atelierHistoryIndex<atelierHistory.length-1?"pointer":"not-allowed"},
        onclick:()=>{if(atelierHistoryIndex<atelierHistory.length-1){atelierHistoryIndex++;render();}}
      },"Suiv. ▶");
      nav.append(prev,ctr,next);
      resWrap.append(nav);
    }

    // Résultat
    const box = h("div",{style:{background:C.white,borderRadius:"10px",border:"1px solid "+C.border,padding:"14px"}});
    if (atelierLoading) box.append(shimmerBlock(5));
    else box.append(h("pre",{style:{fontSize:"13px",lineHeight:isSmsRes?"1.35":"1.8",color:C.navy,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},currentResult));
    resWrap.append(box);

    // 4 boutons modif
    const grid = h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}});
    MODS.forEach((lbl,i)=>{
      const id=MOD_IDS[i],isA=atelierActiveMod===id,dis=atelierLoading||!currentResult;
      grid.append(h("button",{style:{height:"34px",borderRadius:"7px",fontSize:"11px",fontWeight:"700",background:isA?C.lavande:C.white,border:"1.5px solid "+(isA?C.lavandeDark:C.border),color:isA?C.white:C.navy,cursor:dis?"not-allowed":"pointer",opacity:dis?0.4:1},onclick:()=>{if(!dis)applyAtelierMod(id);}},lbl));
    });
    resWrap.append(grid);
    wrap.append(resWrap);

    // Barre du bas : Consigne + 3 boutons
    const bottom = h("div",{style:{padding:"10px 14px 14px",background:C.white,borderTop:"1px solid "+C.border,flexShrink:"0",display:"flex",flexDirection:"column",gap:"7px"}});
    const cTA = h("textarea",{
      style:{width:"100%",padding:"8px 12px",borderRadius:"8px",border:"2px solid "+C.navy,fontSize:"12px",color:C.navy,fontFamily:"'DM Sans',sans-serif",background:C.white,resize:"none",outline:"none",lineHeight:"1.5"},
      placeholder:"Consigne : ajouter 'le 5 juin', plus court…",rows:"2"
    });
    cTA.value = atelierConsigne;
    cTA.addEventListener("input", e => { atelierConsigne = e.target.value; });
    cTA.addEventListener("keydown", e => { e.stopPropagation(); });

    const btnLine = h("div",{style:{display:"flex",gap:"7px"}});
    const regen = h("button",{
      style:{flex:"1",height:"38px",borderRadius:"8px",fontSize:"12px",fontWeight:"700",background:C.bgsoft,border:"1.5px solid "+C.border,color:C.navy,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"5px"},
      onclick:()=>{if(!atelierLoading&&atelierInput.trim())launchAtelier();}
    },"↻ Régénérer");
    const guided2 = h("button",{
      style:{height:"38px",padding:"0 10px",borderRadius:"8px",fontSize:"12px",fontWeight:"700",background:C.navy,border:"none",color:C.white,cursor:"pointer"},
      onclick:()=>{if(!atelierLoading&&atelierInput.trim())launchGuide();}
    },"🎯");
    const nouveau = h("button",{
      style:{height:"38px",padding:"0 10px",borderRadius:"8px",fontSize:"12px",fontWeight:"700",background:C.bgsoft,border:"1.5px solid "+C.border,color:C.navy,cursor:"pointer"},
      onclick:()=>{atelierInput="";atelierResult="";atelierHistory=[];atelierHistoryIndex=-1;atelierActiveMod=null;atelierConsigne="";atelierGuideStep="idle";atelierQuestions="";atelierAnswers="";render();}
    },"✦");
    btnLine.append(regen, guided2, nouveau);

    const copyBtn = h("button",{
      style:{width:"100%",height:"44px",borderRadius:"8px",fontSize:"13px",fontWeight:"700",background:atelierCopied?C.green:C.navy,border:"none",color:C.white,cursor:"pointer",letterSpacing:"0.5px",transition:"all 0.2s",fontFamily:"'Futura PT','Futura','Century Gothic',sans-serif"},
      onclick:()=>{navigator.clipboard.writeText(currentResult).catch(()=>{});atelierCopied=true;render();setTimeout(()=>{atelierCopied=false;render();},2500);}
    },atelierCopied?"✓ COPIÉ !":"COPIER LE RÉSULTAT");

    bottom.append(cTA, btnLine, copyBtn);
    wrap.append(bottom);
  }

  return wrap;
}

// ── ACTIONS ────────────────────────────────────────────────────────────────────
async function launchGuide() {
  if (!atelierInput.trim()) return;
  atelierLoading=true; atelierGuideStep="idle"; render();
  try {
    atelierQuestions = await doAtelierGuide(atelierInput, atelierType, atelierMode);
    atelierGuideStep="questions";
  } catch(e) { atelierGuideStep="idle"; }
  atelierLoading=false; render();
}

async function launchWithAnswers() {
  if (!atelierAnswers.trim()) return;
  atelierLoading=true; atelierGuideStep="result"; render();
  try {
    const res = await doAtelierAvecReponses(atelierInput, atelierType, atelierMode, atelierQuestions, atelierAnswers);
    atelierHistory.push(res);
    atelierHistoryIndex = atelierHistory.length-1;
    atelierResult = res;
  } catch(e) {}
  atelierLoading=false; render();
}
async function launchAtelier() {
  if (!atelierInput.trim()) return;
  atelierLoading=true; atelierActiveMod=null; render();
  try {
    const res = atelierMode==="repondre"
      ? await doAtelierRepondre(atelierInput, atelierType, null, null)
      : await doAtelierReformuler(atelierInput, atelierType, null, null);
    atelierHistory.push(res);
    atelierHistoryIndex = atelierHistory.length-1;
    atelierResult = res;
  } catch(e) {}
  atelierLoading=false; render();
}

async function applyAtelierMod(mod) {
  const currentResult = atelierHistoryIndex>=0 ? atelierHistory[atelierHistoryIndex] : "";
  if (!currentResult) return;
  atelierActiveMod=mod; atelierLoading=true; render();
  try {
    const res = atelierMode==="repondre"
      ? await doAtelierRepondre(atelierInput, atelierType, mod, currentResult)
      : await doAtelierReformuler(atelierInput, atelierType, mod, currentResult);
    atelierHistory.push(res);
    atelierHistoryIndex = atelierHistory.length-1;
    atelierResult = res;
  } catch(e) {}
  atelierLoading=false; render();
}

function openEmail(email) {
  selected=email; analysis=null; reply=""; activeMod=null; copied=false; activeTab="reply";
  screen="detail"; loading=true; render();
  doAnalyze(email).then(ana=>{
    analysis=ana; loading=false; replyLoading=true; render();
    return doReply(email,ana,null,null);
  }).then(rep=>{ reply=rep; replyLoading=false; render(); })
  .catch(()=>{ analysis={category:"Erreur",summary:"Impossible d'analyser",demand:"-",urgency:"faible",action:"-"}; reply="Une erreur est survenue."; loading=false; replyLoading=false; render(); });
}

function applyMod(mod) {
  if (!selected||!analysis||!reply) return;
  activeMod=mod; replyLoading=true; render();
  doReply(selected,analysis,mod,reply).then(rep=>{ reply=rep; replyLoading=false; render(); }).catch(()=>{ replyLoading=false; render(); });
}

function regenerate() {
  if (!selected||!analysis) return;
  activeMod=null; replyLoading=true; render();
  doReply(selected,analysis,null,null).then(rep=>{ reply=rep; replyLoading=false; render(); }).catch(()=>{ replyLoading=false; render(); });
}

function doCopy() {
  navigator.clipboard.writeText(reply).catch(()=>{});
  copied=true; render();
  setTimeout(()=>{ copied=false; render(); },2500);
}

function fieldBlock(lbl,val,isPre) {
  const wrap = h("div",{});
  wrap.append(h("div",{style:{fontSize:"10px",fontWeight:"700",color:C.muted,textTransform:"uppercase",letterSpacing:"1.3px",marginBottom:"6px"}},lbl));
  const card = h("div",{style:{background:C.white,borderRadius:"9px",border:"1px solid "+C.border,padding:"11px 13px"}});
  if (isPre) card.append(h("pre",{style:{fontSize:"13px",lineHeight:"1.85",color:C.navy,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:"0"}},val));
  else card.append(h("div",{style:{fontSize:"13px",color:C.navy,lineHeight:"1.6"}},val));
  wrap.append(card);
  return wrap;
}

loadEmails();
setInterval(loadEmails, 30000);
</script>
